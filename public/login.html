<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nabio Store - Login</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: radial-gradient(circle at 50% 0%, rgba(124, 58, 237, 0.06), transparent 50%),
                  radial-gradient(circle at 0% 100%, rgba(192, 132, 252, 0.02), transparent 45%),
                  #050505;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .login-container {
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .brand-icon-large {
      width: 64px;
      height: 64px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
    }

    .login-header h2 {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
    }

    .login-header p {
      color: var(--text-secondary);
      font-size: 14px;
    }

    .form-card {
      padding: 35px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .form-group input {
      width: 100%;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid var(--border-light);
      border-radius: var(--border-radius-md);
      padding: 14px 18px;
      color: var(--text-primary);
      font-size: 14px;
      transition: var(--transition-normal);
    }

    .form-group input:focus {
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.06);
      box-shadow: 0 0 15px rgba(124, 58, 237, 0.2);
    }

    .btn-login {
      width: 100%;
      padding: 14px;
      font-size: 15px;
      margin-top: 10px;
    }

    .error-box {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.25);
      border-radius: var(--border-radius-sm);
      padding: 12px 15px;
      color: #f87171;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 20px;
      display: none;
      align-items: center;
      gap: 10px;
    }

    .error-box svg {
      flex-shrink: 0;
    }

    .login-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="login-container">
    <div class="login-header">
      <div class="brand-icon-large">
        <img src="/logo-nabio-store/logo.png" alt="Logo" style="width: 100%; height: 100%; object-fit: contain;">
      </div>
      <h2 class="text-gradient">NABIO STORE</h2>
      <p>Gerencie sua loja com alta performance</p>
    </div>

    <div class="glass-panel form-card">
      <div class="error-box" id="error-message">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
        <span id="error-text">Credenciais inválidas.</span>
      </div>

      <form id="login-form">
        <div class="form-group">
          <label for="email">E-mail ou Usuário</label>
          <input type="text" id="email" required placeholder="contato@nabio.com" autocomplete="username">
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
        </div>

        <button type="submit" class="btn-primary btn-login">
          Entrar no Sistema
        </button>
      </form>
    </div>

    <div class="login-footer">
      NABIO STORE © 2026 • Design de Alta Performance
    </div>
  </div>

  <script>
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorBox = document.getElementById('error-message');
      const errorText = document.getElementById('error-text');
      
      errorBox.style.display = 'none';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password })
        });

        const data = await response.json();

        if (response.ok) {
          window.location.href = '/';
        } else {
          errorText.textContent = data.message || 'Erro de autenticação.';
          errorBox.style.display = 'flex';
        }
      } catch (err) {
        errorText.textContent = 'Erro ao conectar ao servidor.';
        errorBox.style.display = 'flex';
      }
    });
  </script>
</body>
</html>
